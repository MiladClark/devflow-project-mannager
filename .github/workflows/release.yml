name: Release

# Push a tag like "v1.2.0" (matching the version in package.json) to trigger
# this. Windows-only for now (no macOS build — see git history if that needs
# reviving): builds the portable zip + NSIS Setup installer, publishes both
# to a GitHub Release, and registers each with DevTune's OTA update-check API
# — no manual build/upload/registration step needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag $TAG_NAME does not match package.json version $PKG_VERSION. Bump the version in package.json to match before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable zip
        shell: bash
        run: |
          npm run package
          node scripts/package-zip.mjs --out-dir release

      - name: Build Windows Setup installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win nsis --publish never

      - name: Prepare Setup installer manifest
        shell: bash
        run: |
          set -e
          FILE=$(ls release/*.exe | head -n 1)
          if [ -z "$FILE" ]; then
            echo "::error::No Setup installer artifact found in release/"
            exit 1
          fi
          VERSION="$(node -p "require('./package.json').version")"
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const file = process.argv[1];
            const hash = crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');
            const info = {
              platform: 'windows-setup',
              version: '$VERSION',
              fileName: require('path').basename(file),
              sha256: hash,
              sizeBytes: fs.statSync(file).size,
            };
            fs.writeFileSync('release/manifest-setup.json', JSON.stringify(info, null, 2));
            console.log(info);
          " "$FILE"

      - name: Ensure draft release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --repo "$REPO" \
              --draft --title "DevFlow Manager $TAG" --generate-notes \
              || gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
              || { echo "::error::Failed to create or find release $TAG"; exit 1; }
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release/*.zip release/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No build artifacts found in release/"
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${files[@]}" --repo "${{ github.repository }}" --clobber

      # Manifests (checksum/size/filename) are handed to the final job instead
      # of registering here, so registration only ever happens after the
      # release is flipped out of draft (draft assets 404 for anonymous
      # downloads, so advertising them to real users' update-checkers earlier
      # than that would be a broken update).
      - name: Upload manifest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-windows
          path: release/manifest*.json
          retention-days: 1

  register-and-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: manifest-*
          path: manifests
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"

      - name: Register releases with DevTune
        env:
          RELEASE_REGISTER_TOKEN: ${{ secrets.RELEASE_REGISTER_TOKEN }}
        run: |
          set -e
          for manifest in manifests/manifest*.json; do
            [ -e "$manifest" ] || continue
            version=$(node -p "require('./$manifest').version")
            fileName=$(node -p "require('./$manifest').fileName")
            sha256=$(node -p "require('./$manifest').sha256")
            size=$(node -p "require('./$manifest').sizeBytes")
            platform=$(node -p "require('./$manifest').platform || 'windows'")
            downloadUrl="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${fileName}"
            echo "Registering $platform $version -> $downloadUrl"
            curl -sS -f -X POST "https://devtune.app/api/admin/releases" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${RELEASE_REGISTER_TOKEN}" \
              -d "{\"product\":\"devflow\",\"version\":\"${version}\",\"platform\":\"${platform}\",\"downloadUrl\":\"${downloadUrl}\",\"checksum\":\"${sha256}\",\"sizeBytes\":${size}}"
          done

appId: com.devtune.devflowmanager
productName: DevFlow Manager
icon: build/icon.ico
directories:
  output: release
  buildResources: build
compression: maximum
electronLanguages:
  - en-US
# node-pty ships ABI-stable N-API prebuilt binaries that work in Electron as-is,
# so we must NOT let electron-builder recompile them (its rebuild of the bundled
# winpty fails on GetCommitHash.bat). Shipping the prebuild is correct and works.
npmRebuild: false
# Whitelist only runtime artifacts. Source, scripts, verify caches, and
# unused production deps must never land in the portable release.
files:
  - dist/**
  - dist-electron/**
  - package.json
  - "!node_modules/**"
  # node-pty is required at runtime by the integrated terminal (loaded from
  # node_modules because it is a native module, excluded from the vite bundle)
  - node_modules/node-pty/**
  - "!node_modules/node-pty/prebuilds/darwin-*"
  - "!node_modules/node-pty/prebuilds/win32-arm64"
  - "!node_modules/node-pty/deps/**"
  - "!node_modules/node-pty/src/**"
  - "!node_modules/node-pty/scripts/**"
  - "!node_modules/node-pty/third_party/**"
  - "!node_modules/node-pty/typings/**"
  - "!node_modules/node-pty/build/**"
  - "!node_modules/node-pty/binding.gyp"
  - "!node_modules/node-pty/**/*.{md,markdown,ts,map}"
  - "!node_modules/node-pty/**/{README*,CHANGELOG*,LICENSE*,*.d.ts}"
  # Project junk / non-runtime trees (never needed inside asar)
  - "!.verify-tmp/**"
  - "!src/**"
  - "!electron/**"
  - "!scripts/**"
  - "!public/**"
  - "!build/**"
  - "!.claude/**"
  - "!.git/**"
  - "!release/**"
  - "!devflow/**"
  - "!**/*.{md,MD}"
  - "!tsconfig.json"
  - "!vite.config.ts"
  - "!build-release.bat"
  - "!SIGNING.md"
  - "!.gitignore"
  # non-runtime cruft: debug symbols and source maps
  - "!**/*.pdb"
  - "!**/*.map"
asarUnpack:
  - "**/node_modules/node-pty/**"
extraResources:
  # brand icon used at runtime for window + system-tray (Windows .ico)
  - from: build/icon.ico
    to: icon.ico
  - from: build/icon.png
    to: icon.png
  - from: build/icon.icns
    to: icon.icns
win:
  icon: build/icon.ico
  # winCodeSign extraction needs symlink privilege on Windows; embed icon via rcedit post-build instead.
  signAndEditExecutable: false
  target:
    - dir
mac:
  icon: build/icon.icns
  target:
    - target: zip
      arch: [x64, arm64]
    - target: dmg
      arch: [x64, arm64]
  artifactName: ${name}-${version}-${arch}.${ext}
  # No paid Apple Developer account (same "no paid cert" stance as SIGNING.md
  # for Windows) — ship ad-hoc-signed, unnotarized builds. Users must
  # right-click → Open (or clear the quarantine attribute) on first launch.
  notarize: false
  # electron-builder's platform-scoped `files:` REPLACES the top-level array
  # rather than merging with it, so the base excludes are repeated here with
  # win32 prebuilds pruned instead of darwin ones (mirrors win: implicitly
  # using the top-level list, which still prunes darwin-*).
  files:
    - dist/**
    - dist-electron/**
    - package.json
    - "!node_modules/**"
    - node_modules/node-pty/**
    - "!node_modules/node-pty/prebuilds/win32-*"
    - "!node_modules/node-pty/deps/**"
    - "!node_modules/node-pty/src/**"
    - "!node_modules/node-pty/scripts/**"
    - "!node_modules/node-pty/third_party/**"
    - "!node_modules/node-pty/typings/**"
    - "!node_modules/node-pty/build/**"
    - "!node_modules/node-pty/binding.gyp"
    - "!node_modules/node-pty/**/*.{md,markdown,ts,map}"
    - "!node_modules/node-pty/**/{README*,CHANGELOG*,LICENSE*,*.d.ts}"
    - "!.verify-tmp/**"
    - "!src/**"
    - "!electron/**"
    - "!scripts/**"
    - "!public/**"
    - "!build/**"
    - "!.claude/**"
    - "!.git/**"
    - "!release/**"
    - "!devflow/**"
    - "!**/*.{md,MD}"
    - "!tsconfig.json"
    - "!vite.config.ts"
    - "!build-release.bat"
    - "!SIGNING.md"
    - "!.gitignore"
    - "!**/*.pdb"
    - "!**/*.map"
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: MiladClark
  repo: devflow-project-mannager
  # Windows and macOS CI jobs upload to the same release in parallel; staying
  # in draft avoids one job's finalize wiping assets the other already
  # uploaded. A final CI step flips it to a real release once all jobs are done.
  releaseType: draft
